on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PACK_NAME: minemoji

jobs:
    generate-pack:
        name: Generate Minemoji Pack
        runs-on: ubuntu-latest
        steps:
        - name: Checkout submodules
          uses: actions/checkout@v5
          with:
            submodules: true
        - name: Download latest release
          uses: robinraju/release-downloader@v1
          with:
            latest: true
            repository: 'cinnamondev/minemoji'
            fileName: 'minemoji.jar'
            tarBall: false
            zipBall: false
        - uses: actions/setup-java@v5
          with:
            distribution: 'temurin'
            java-version: '21'
        - name: Install ImageMagick
          run: sudo apt-get update && sudo apt-get install -y imagemagick
        - name: Remove invalid images
          run: |
            echo "Validating and removing invalid images..."
            for file in ./assets/*; do
              if [ -f "$file" ]; then
                # Check if it's an image file
                if [[ "$file" =~ \.(png|gif|jpg|jpeg)$ ]]; then
                  echo "Checking: $file"
                  
                  # Get dimensions safely
                  dims=$(identify -format "%wx%h" "$file" 2>/dev/null)
                  
                  if [ $? -eq 0 ] && [ -n "$dims" ]; then
                    width=$(echo "$dims" | cut -d'x' -f1)
                    height=$(echo "$dims" | cut -d'x' -f2)
                    
                    echo "  Dimensions: ${width}x${height}"
                    
                    # Check if dimensions are valid numbers
                    if ! [[ "$width" =~ ^[0-9]+$ ]] || ! [[ "$height" =~ ^[0-9]+$ ]]; then
                      echo "  ❌ Invalid dimension format, removing: $file"
                      rm "$file"
                    elif [ "$width" -le 0 ] || [ "$height" -le 0 ]; then
                      echo "  ❌ Invalid dimensions (${width}x${height}), removing: $file"
                      rm "$file"
                    else
                      echo "  ✓ Valid"
                    fi
                  else
                    echo "  ❌ Cannot read file, removing: $file"
                    rm "$file"
                  fi
                fi
              fi
            done
          continue-on-error: false
        - name: Generate Pack
          env: 
            GH_TOKEN: ${{ github.token }}
          run: >
            java -cp minemoji.jar com.github.cinnamondev.minemoji.PackMaker.PackMaker 
            --input-directory ./assets/
            --output-directory ./site/${PACK_NAME}
            --prefix ${PACK_NAME}
            --pack-url $(gh api "repos/$GITHUB_REPOSITORY/pages" --jq '.html_url')${PACK_NAME}.zip
            --zip-pack
            --width 32
        - name: serve example json
          run: cp ./site/${PACK_NAME}/${PACK_NAME}.json ./site/${PACK_NAME}.json
        - name: Setup Pages
          uses: actions/configure-pages@v5
        - name: Upload artifacts
          uses: actions/upload-pages-artifact@v3
          with:
            path: './site/'
        - name: Deploy to github pages
          id: deployment
          uses: actions/deploy-pages@v4