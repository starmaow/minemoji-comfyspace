on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PACK_NAME: minemoji

jobs:
    generate-pack:
        name: Generate Minemoji Pack
        runs-on: ubuntu-latest
        steps:
        - name: Checkout submodules
          uses: actions/checkout@v5
          with:
            submodules: true
        - name: Download latest release
          uses: robinraju/release-downloader@v1
          with:
            latest: true
            repository: 'cinnamondev/minemoji'
            fileName: 'minemoji.jar'
            tarBall: false
            zipBall: false
        - uses: actions/setup-java@v5
          with:
            distribution: 'temurin'
            java-version: '21'
        - name: Remove invalid images
          run: |
            echo "Validating and removing invalid images..."
            for file in ./assets/*.{png,gif,jpg,jpeg}; do
              if [ -f "$file" ]; then
                dimensions=$(identify "$file" 2>/dev/null | head -1)
                if [ $? -ne 0 ]; then
                  echo "Removing corrupted file: $file"
                  rm "$file"
                else
                  width=$(echo "$dimensions" | grep -oP '\d+x\d+' | cut -d'x' -f1)
                  height=$(echo "$dimensions" | grep -oP '\d+x\d+' | cut -d'x' -f2)
                  if [ "$width" -le 0 ] || [ "$height" -le 0 ]; then
                    echo "Removing invalid dimensions ($width x $height): $file"
                    rm "$file"
                  fi
                fi
              fi
            done
          continue-on-error: true
        - name: Generate Pack
          env: 
            GH_TOKEN: ${{ github.token }}
          run: >
            java -cp minemoji.jar com.github.cinnamondev.minemoji.PackMaker.PackMaker 
            --input-directory ./assets/
            --output-directory ./site/${PACK_NAME}
            --prefix ${PACK_NAME}
            --pack-url $(gh api "repos/$GITHUB_REPOSITORY/pages" --jq '.html_url')${PACK_NAME}.zip
            --zip-pack
            --width 32
        - name: serve example json
          run: cp ./site/${PACK_NAME}/${PACK_NAME}.json ./site/${PACK_NAME}.json
        - name: Setup Pages
          uses: actions/configure-pages@v5
        - name: Upload artifacts
          uses: actions/upload-pages-artifact@v3
          with:
            path: './site/'
        - name: Deploy to github pages
          id: deployment
          uses: actions/deploy-pages@v4